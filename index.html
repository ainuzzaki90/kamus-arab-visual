<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamus Visual Arab-Indonesia AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri&family=Inter:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f4f8;
        }
        .arabic-text {
            font-family: 'Amiri', serif;
            direction: rtl;
        }
        .loading-shimmer {
            background: linear-gradient(90deg, #e2e8f0 25%, #f8fafc 50%, #e2e8f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-8">
            <div class="inline-block p-3 bg-emerald-100 rounded-full mb-4">
                <i class="fas fa-mosque text-emerald-600 text-3xl"></i>
            </div>
            <h1 class="text-4xl font-bold text-slate-800 mb-2">Kamus Visual Islami</h1>
            <p class="text-slate-600">Pelajari Bahasa Arab dengan AI ✨</p>
        </header>

        <!-- Search Section -->
        <div class="bg-white rounded-3xl shadow-xl border border-slate-100 p-6 mb-8">
            <div class="space-y-4">
                <div class="relative">
                    <input 
                        type="text" 
                        id="searchInput"
                        placeholder="Masukkan kata (Contoh: Buku, Rumah)..." 
                        class="w-full pl-12 pr-4 py-4 rounded-2xl border-2 border-slate-100 focus:border-emerald-500 focus:outline-none text-lg transition-colors"
                    >
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl"></i>
                </div>
                <button 
                    onclick="handleSearch()"
                    id="searchBtn"
                    class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-emerald-200 transition-all active:scale-95 flex items-center justify-center gap-2"
                >
                    <i class="fas fa-magic"></i> Cari & Analisis ✨
                </button>
            </div>
        </div>

        <!-- Error Message (Hidden by default) -->
        <div id="errorMessage" class="hidden mb-6 p-4 bg-red-50 border border-red-100 text-red-600 rounded-2xl text-center text-sm font-medium">
        </div>

        <!-- Result Content -->
        <div id="resultContainer" class="hidden space-y-6 animate-fade-in">
            <!-- Main Result Card -->
            <div class="bg-white rounded-3xl shadow-md border border-slate-100 overflow-hidden">
                <div class="p-8 border-b border-slate-50">
                    <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                        <div class="text-center md:text-left">
                            <span class="px-3 py-1 bg-emerald-50 text-emerald-600 rounded-full text-xs font-bold uppercase tracking-widest mb-2 inline-block font-sans">Terjemahan</span>
                            <h2 id="targetWord" class="text-3xl font-bold text-slate-800 mb-1">...</h2>
                            <div class="flex items-center justify-center md:justify-start gap-4 mt-2">
                                <p id="translatedWord" class="arabic-text text-5xl text-emerald-700 font-medium">...</p>
                                <button onclick="playAudio('translatedWord')" class="p-3 bg-emerald-100 text-emerald-700 rounded-2xl hover:bg-emerald-200 transition-colors">
                                    <i class="fas fa-volume-up text-xl"></i>
                                </button>
                            </div>
                        </div>
                        <div class="w-full md:w-48 aspect-square relative rounded-2xl overflow-hidden bg-slate-50 border border-slate-100">
                            <div id="imageLoader" class="absolute inset-0 loading-shimmer z-10 hidden"></div>
                            <img id="resultImage" class="w-full h-full object-cover hidden" alt="Visual AI">
                            <div id="imagePlaceholder" class="flex flex-col items-center justify-center h-full text-slate-300">
                                <i class="fas fa-image text-4xl mb-2"></i>
                                <span class="text-xs">Gambar AI</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="p-6 bg-slate-50/50">
                    <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-2">
                        <i class="fas fa-brain text-emerald-500"></i> Tata Bahasa
                    </h3>
                    <p id="grammarContent" class="text-slate-700 leading-relaxed text-sm"></p>
                </div>
            </div>

            <!-- Example List -->
            <div class="bg-white rounded-3xl shadow-md border border-slate-100 p-6">
                <h3 class="font-bold text-slate-800 mb-6 flex items-center gap-2">
                    <i class="fas fa-list-ul text-emerald-500"></i> Contoh Kalimat
                </h3>
                <div id="examplesList" class="space-y-6"></div>
            </div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-20">
            <div class="text-slate-200 text-8xl mb-6">
                <i class="fas fa-book-open"></i>
            </div>
            <p class="text-slate-500 font-medium">Masukkan kata untuk memulai pengalaman belajar AI</p>
        </div>

        <footer class="mt-12 text-center">
            <p class="text-slate-400 text-xs tracking-widest uppercase">Digital Islamic Learning Tool</p>
        </footer>
    </div>

    <script>
        // API Key Baru Anda
        const apiKey = "AIzaSyCQlUlJXkhPupzqXGoTgKJOhXZockDurFw"; 
        
        // Menggunakan model 1.5-flash untuk stabilitas publik
        const MODEL_NAME = "gemini-1.5-flash"; 

        let currentData = null;
        let audioMap = {};

        function showError(msg) {
            const errDiv = document.getElementById('errorMessage');
            errDiv.innerText = msg;
            errDiv.classList.remove('hidden');
        }

        function hideError() {
            document.getElementById('errorMessage').classList.add('hidden');
        }

        async function handleSearch() {
            const input = document.getElementById('searchInput');
            const query = input.value.trim();
            if (!query) return;

            const btn = document.getElementById('searchBtn');
            const resultContainer = document.getElementById('resultContainer');
            const emptyState = document.getElementById('emptyState');
            const imageLoader = document.getElementById('imageLoader');
            const resultImage = document.getElementById('resultImage');
            const imagePlaceholder = document.getElementById('imagePlaceholder');

            hideError();
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i>Proses...';
            audioMap = {};

            try {
                const systemPrompt = `Anda adalah ahli bahasa Arab. Berikan respon dalam JSON murni:
                {
                    "word": "kata asal",
                    "translation": "terjemahan harakat lengkap",
                    "grammar_analysis": "Penjelasan singkat tata bahasa Arab.",
                    "examples": [
                        {"ar": "kalimat arab", "id": "arti indonesia"}
                    ],
                    "image_prompt": "simple object name in english for illustration"
                }`;

                const textResponse = await callGemini(query, systemPrompt);
                currentData = JSON.parse(textResponse);

                document.getElementById('targetWord').innerText = currentData.word;
                document.getElementById('translatedWord').innerText = currentData.translation;
                document.getElementById('grammarContent').innerText = currentData.grammar_analysis;
                
                audioMap['translatedWord'] = currentData.translation;

                const list = document.getElementById('examplesList');
                list.innerHTML = '';
                currentData.examples.forEach((ex, i) => {
                    audioMap[`ex_${i}`] = ex.ar;
                    const item = document.createElement('div');
                    item.className = "flex items-start gap-4 p-4 rounded-2xl bg-slate-50 border border-slate-100";
                    item.innerHTML = `
                        <button onclick="playAudio('ex_${i}')" class="mt-1 p-2 bg-white text-emerald-600 rounded-xl shadow-sm hover:bg-emerald-50 transition-colors">
                            <i class="fas fa-volume-up"></i>
                        </button>
                        <div class="flex-1 text-right">
                            <p class="arabic-text text-2xl text-slate-800">${ex.ar}</p>
                            <p class="text-slate-500 text-sm mt-1 text-left">${ex.id}</p>
                        </div>
                    `;
                    list.appendChild(item);
                });

                emptyState.classList.add('hidden');
                resultContainer.classList.remove('hidden');

                // Generate Gambar (Seringkali memerlukan izin khusus pada API Key, namun tetap dijalankan sebagai bonus)
                imageLoader.classList.remove('hidden');
                resultImage.classList.add('hidden');
                imagePlaceholder.classList.add('hidden');

                try {
                    const imgUrl = await generateImage(`Minimalist clean illustration of ${currentData.image_prompt}, faceless style.`);
                    if (imgUrl) {
                        resultImage.src = imgUrl;
                        resultImage.onload = () => {
                            imageLoader.classList.add('hidden');
                            resultImage.classList.remove('hidden');
                        };
                    } else {
                        throw new Error();
                    }
                } catch (e) {
                    imageLoader.classList.add('hidden');
                    imagePlaceholder.classList.remove('hidden');
                }

            } catch (err) {
                console.error(err);
                showError("Gagal terhubung ke AI: " + (err.message || "Pastikan API Key valid dan kuota mencukupi."));
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-magic"></i> Cari & Analisis ✨';
            }
        }

        async function callGemini(query, systemPrompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`;
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: query }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] },
                    generationConfig: { responseMimeType: "application/json" }
                })
            });
            
            if (!response.ok) {
                const errData = await response.json();
                throw new Error(errData.error?.message || "API Request Failed");
            }
            
            const result = await response.json();
            return result.candidates[0].content.parts[0].text;
        }

        async function generateImage(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        instances: [{ prompt: prompt }],
                        parameters: { sampleCount: 1 }
                    })
                });
                if (!response.ok) return null;
                const result = await response.json();
                return `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
            } catch (e) { return null; }
        }

        async function playAudio(key) {
            const text = audioMap[key];
            if (!text) return;

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } }
                        }
                    })
                });

                const result = await response.json();
                const audioData = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                
                if (audioData) {
                    const blob = pcmToWav(audioData, 24000);
                    new Audio(URL.createObjectURL(blob)).play();
                }
            } catch (e) { console.error(e); }
        }

        function pcmToWav(base64, sampleRate) {
            const binaryString = window.atob(base64);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) bytes[i] = binaryString.charCodeAt(i);
            const buffer = new ArrayBuffer(44 + len);
            const view = new DataView(buffer);
            const writeString = (pos, str) => { for (let i = 0; i < str.length; i++) view.setUint8(pos + i, str.charCodeAt(i)); };
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + len, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, len, true);
            for (let i = 0; i < len; i++) view.setUint8(44 + i, bytes[i]);
            return new Blob([buffer], { type: 'audio/wav' });
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSearch(); });
    </script>
</body>
</html>
